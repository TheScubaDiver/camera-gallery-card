version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      rollup:
        patterns:
          - "rollup"
          - "@rollup/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "typescript-eslint"
      typescript:
        patterns:
          - "typescript"
          - "tslib"
      lit:
        patterns:
          - "lit"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
