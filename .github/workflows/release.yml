name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Serialize releases — never run two of these in parallel against the same
# release PR. Don't cancel an in-flight release; let it finish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Mint a short-lived installation token for the release-bot GitHub App.
      # Using the app token (instead of the default GITHUB_TOKEN) means
      # release-please's PR opens/syncs trigger downstream workflows like
      # CI — GitHub suppresses workflow triggers from GITHUB_TOKEN events
      # but not from app-installation-token events.
      #
      # Setup: see "Maintainer setup → release-bot GitHub App" in
      # CONTRIBUTING.md. Requires repo variable RELEASE_BOT_APP_ID and
      # repo secret RELEASE_BOT_PRIVATE_KEY.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When release-please cuts a tag, build the bundle from the tagged source
  # and attach it to the GitHub Release. The bundle is *not* committed to the
  # repo — HACS picks it up from the release asset (hacs.json sets
  # hide_default_branch: true so default-branch installs are disabled).
  upload-bundle:
    name: Upload bundle to GitHub Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Upload bundle to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/camera-gallery-card.js
