name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-flight CI run when a new commit lands on the same ref.
# `github.ref` covers both branches (push) and pull request refs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # Verifies the bundle still builds clean from src/. The bundle is not
      # committed to the repo — release.yml builds it from the tagged source
      # and attaches it to the GitHub Release as an asset.
      - name: Build
        run: npm run build
